<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4BD964"/>
      <stop offset="100%" stop-color="#00A632"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>
  <!-- Map roads -->
  <path d="M40,160 Q80,120 128,100 Q176,80 220,110" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M60,200 Q100,170 128,150 Q160,130 200,140" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M120,40 L115,180" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Pin -->
  <circle cx="148" cy="106" r="34" fill="white" opacity="0.95"/>
  <circle cx="148" cy="106" r="22" fill="#FF3B30"/>
  <circle cx="148" cy="98" r="8" fill="white"/>
