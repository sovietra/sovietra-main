<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1600" viewBox="0 0 2560 1600">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA3D9"/>
      <stop offset="40%" stop-color="#87C4E8"/>
      <stop offset="80%" stop-color="#C2DFEF"/>
      <stop offset="100%" stop-color="#E2F0F7"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B7EC5"/>
      <stop offset="50%" stop-color="#0F5E99"/>
      <stop offset="100%" stop-color="#0A4070"/>
    </linearGradient>
    <linearGradient id="shoreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DB358"/>
      <stop offset="100%" stop-color="#4A8A3A"/>
    </linearGradient>
    <linearGradient id="hillBgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8CC870"/>
      <stop offset="100%" stop-color="#5A9A45"/>
    </linearGradient>
    <linearGradient id="hillFgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8A38"/>
      <stop offset="100%" stop-color="#2E6022"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="72%" cy="18%" r="15%">
      <stop offset="0%" stop-color="#FFF9D4" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FFE88A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFF9D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seaGlow" cx="72%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#4EC3F0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4EC3F0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur6">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="2560" height="1600" fill="url(#skyGrad)"/>

  <!-- Sun glow -->
  <ellipse cx="1843" cy="280" rx="340" ry="240" fill="url(#sunGlow)"/>
  <!-- Sun disc -->
  <circle cx="1843" cy="280" r="70" fill="#FFF7B0" opacity="0.92" filter="url(#blur2)"/>
  <circle cx="1843" cy="280" r="52" fill="#FFEE58" opacity="0.96"/>

  <!-- Far clouds left -->
  <ellipse cx="230" cy="195" rx="180" ry="52" fill="white" opacity="0.82" filter="url(#blur2)"/>
  <ellipse cx="340" cy="170" rx="150" ry="46" fill="white" opacity="0.90" filter="url(#blur2)"/>
  <ellipse cx="160" cy="215" rx="110" ry="38" fill="white" opacity="0.72" filter="url(#blur2)"/>

  <!-- Mid clouds -->
  <ellipse cx="1050" cy="145" rx="220" ry="58" fill="white" opacity="0.75" filter="url(#blur2)"/>
  <ellipse cx="1190" cy="120" rx="170" ry="48" fill="white" opacity="0.85" filter="url(#blur2)"/>
  <ellipse cx="960"  cy="165" rx="130" ry="42" fill="white" opacity="0.65" filter="url(#blur2)"/>

  <!-- Right clouds (near sun, tinted warm) -->
  <ellipse cx="2280" cy="220" rx="200" ry="55" fill="#FFF5CC" opacity="0.70" filter="url(#blur2)"/>
  <ellipse cx="2390" cy="198" rx="160" ry="48" fill="white" opacity="0.78" filter="url(#blur2)"/>

  <!-- Distant hazy hills -->
  <path d="M0,720 Q280,540 560,660 Q840,500 1120,620 Q1400,470 1700,590 Q2000,460 2280,560 Q2420,510 2560,560 L2560,780 L0,780 Z"
        fill="#A8D88A" opacity="0.45" filter="url(#blur6)"/>
  <path d="M0,760 Q320,600 640,700 Q960,560 1280,660 Q1600,520 1920,640 Q2200,570 2560,620 L2560,820 L0,820 Z"
        fill="#88C468" opacity="0.50" filter="url(#blur2)"/>

  <!-- Horizon water meeting sky -->
  <rect y="820" width="2560" height="4" fill="#A8D8F0" opacity="0.6"/>

  <!-- Sea body -->
  <rect y="824" width="2560" height="776" fill="url(#seaGrad)"/>

  <!-- Sea sun reflection -->
  <ellipse cx="1843" cy="1050" rx="180" ry="500" fill="url(#seaGlow)" opacity="0.5"/>
  <path d="M1700,824 Q1843,870 1986,824 L1986,826 Q1843,872 1700,826 Z" fill="white" opacity="0.18"/>

  <!-- Sea wave ripples at horizon -->
  <path d="M0,835 Q320,825 640,840 Q960,830 1280,845 Q1600,835 1920,850 Q2240,840 2560,855 L2560,858 Q2240,843 1920,853 Q1600,838 1280,848 Q960,833 640,843 Q320,828 0,838 Z"
        fill="white" opacity="0.08"/>
  <path d="M0,860 Q400,850 800,865 Q1200,855 1600,870 Q2000,860 2560,875 L2560,878 Q2000,863 1600,873 Q1200,858 800,868 Q400,853 0,863 Z"
        fill="white" opacity="0.06"/>
  <path d="M0,895 Q450,885 900,898 Q1350,888 1800,900 Q2200,892 2560,904 L2560,907 Q2200,895 1800,903 Q1350,891 900,901 Q450,888 0,898 Z"
        fill="white" opacity="0.07"/>

  <!-- Mid-ground coastal land mass -->
  <path d="M0,890 Q180,760 360,840 Q540,700 720,800 Q900,730 1080,820 Q1260,760 1440,860 Q1620,800 1800,870 Q1980,820 2160,880 Q2360,840 2560,890 L2560,1600 L0,1600 Z"
        fill="url(#hillBgGrad)"/>

  <!-- Layered greenery mid-ground -->
  <path d="M0,930 Q200,800 400,880 Q600,740 800,840 Q1000,780 1200,880 Q1400,820 1600,900 L1600,1600 L0,1600 Z"
        fill="#5AA840" opacity="0.85"/>
  <path d="M1200,880 Q1400,800 1600,880 Q1800,820 2000,900 Q2200,850 2560,920 L2560,1600 L1200,1600 Z"
        fill="#5AA840" opacity="0.85"/>

  <!-- Foreground hill / promontory left -->
  <path d="M0,1050 Q150,950 300,1020 Q450,940 600,1010 Q750,950 900,1040 L900,1600 L0,1600 Z"
        fill="url(#hillFgGrad)"/>
  <!-- Foreground right -->
  <path d="M1700,1080 Q1900,970 2100,1050 Q2300,980 2560,1060 L2560,1600 L1700,1600 Z"
        fill="url(#hillFgGrad)"/>

  <!-- Dark foreground band for depth -->
  <path d="M0,1200 Q640,1120 1280,1160 Q1920,1100 2560,1140 L2560,1600 L0,1600 Z"
        fill="#2E6022"/>

  <!-- Tree clusters — left zone -->
  <ellipse cx="95"  cy="1050" rx="58" ry="72" fill="#245C18"/>
  <ellipse cx="165" cy="1030" rx="52" ry="66" fill="#2E7020"/>
  <ellipse cx="235" cy="1055" rx="48" ry="62" fill="#245C18"/>
  <ellipse cx="310" cy="1020" rx="55" ry="68" fill="#2E7020"/>
  <ellipse cx="390" cy="1040" rx="50" ry="64" fill="#245C18"/>
  <ellipse cx="455" cy="1010" rx="60" ry="74" fill="#38841E"/>
  <ellipse cx="540" cy="1030" rx="54" ry="68" fill="#245C18"/>
  <ellipse cx="620" cy="1045" rx="46" ry="60" fill="#2E7020"/>

  <!-- Tree clusters — centre-left -->
  <ellipse cx="820" cy="970" rx="62" ry="76" fill="#2E7020"/>
  <ellipse cx="900" cy="950" rx="56" ry="70" fill="#245C18"/>
  <ellipse cx="980" cy="975" rx="52" ry="66" fill="#38841E"/>
  <ellipse cx="1060" cy="960" rx="58" ry="72" fill="#2E7020"/>
  <ellipse cx="1140" cy="985" rx="50" ry="64" fill="#245C18"/>

  <!-- Tree clusters — centre-right -->
  <ellipse cx="1380" cy="955" rx="60" ry="74" fill="#2E7020"/>
  <ellipse cx="1460" cy="970" rx="54" ry="68" fill="#245C18"/>
  <ellipse cx="1540" cy="950" rx="58" ry="72" fill="#38841E"/>
  <ellipse cx="1620" cy="975" rx="50" ry="64" fill="#2E7020"/>

  <!-- Tree clusters — right zone -->
  <ellipse cx="1820" cy="1030" rx="62" ry="76" fill="#245C18"/>
  <ellipse cx="1900" cy="1015" rx="56" ry="70" fill="#2E7020"/>
  <ellipse cx="1985" cy="1038" rx="52" ry="66" fill="#38841E"/>
  <ellipse cx="2070" cy="1020" rx="58" ry="72" fill="#245C18"/>
  <ellipse cx="2160" cy="1045" rx="50" ry="64" fill="#2E7020"/>
  <ellipse cx="2260" cy="1015" rx="60" ry="74" fill="#38841E"/>
  <ellipse cx="2350" cy="1030" rx="54" ry="68" fill="#245C18"/>
  <ellipse cx="2440" cy="1050" rx="50" ry="62" fill="#2E7020"/>

  <!-- Coastal cliff edge detail -->
  <path d="M0,1058 Q100,1042 200,1055 Q300,1038 400,1052 Q500,1040 600,1058 Q700,1044 800,1060 Q900,1050 1000,1065 Q1100,1052 1200,1068 Q1300,1055 1400,1070 Q1500,1058 1600,1072 Q1700,1060 1800,1075 Q1900,1062 2000,1078 Q2100,1065 2200,1080 Q2350,1068 2560,1090 L2560,1095 Q2350,1073 2200,1085 Q2100,1070 2000,1083 Q1900,1067 1800,1080 Q1700,1065 1600,1077 Q1500,1063 1400,1075 Q1300,1060 1200,1073 Q1100,1057 1000,1070 Q900,1055 800,1065 Q700,1049 600,1063 Q500,1045 400,1057 Q300,1043 200,1060 Q100,1047 0,1063 Z"
        fill="#6BBF50" opacity="0.55"/>

  <!-- Water sparkles near shore -->
  <circle cx="640"  cy="870" r="3" fill="white" opacity="0.5"/>
  <circle cx="920"  cy="855" r="2" fill="white" opacity="0.45"/>
  <circle cx="1360" cy="862" r="3" fill="white" opacity="0.5"/>
  <circle cx="1680" cy="848" r="2" fill="white" opacity="0.45"/>
  <circle cx="2020" cy="875" r="3" fill="white" opacity="0.5"/>
</svg>
