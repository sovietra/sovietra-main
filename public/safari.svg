<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#007AFF"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded rect with padding (10px each side = same visual padding as PNG icons) -->
  <rect x="10" y="10" width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <rect x="10" y="10" width="100" height="100" rx="22" ry="22" fill="url(#shine)"/>

  <!-- Compass ring -->
  <circle cx="60" cy="60" r="33" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- Cardinal ticks -->
  <line x1="60" y1="27" x2="60" y2="34" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="93" y1="60" x2="86" y2="60" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="60" y1="93" x2="60" y2="86" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>
  <line x1="27" y1="60" x2="34" y2="60" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- North needle (red) -->
  <polygon points="60,30 63.5,60 60,57 56.5,60" fill="#FF3B30" opacity="0.95"/>
  <!-- South needle (white) -->
  <polygon points="60,90 63.5,60 60,63 56.5,60" fill="white" opacity="0.9"/>

  <!-- Center hub -->
  <circle cx="60" cy="60" r="3.5" fill="white" opacity="0.95"/>
  <circle cx="60" cy="60" r="1.5" fill="#007AFF"/>
</svg>
